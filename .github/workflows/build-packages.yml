name: Build Packages

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch:
          - aarch64
          - arm

    container:
      image: ghcr.io/termux/package-builder:latest
      options: --privileged --device /dev/fuse

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache built packages
        uses: actions/cache@v5.0.5
        with:
          path: |
            /data/data/.built-packages
            /github/home/.termux-build
          key: termux-build-${{ matrix.arch }}-${{ hashFiles('packages/**') }}
          restore-keys: |
            termux-build-${{ matrix.arch }}-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: /github/home/lib/android-ndk-r29
          key: android-ndk-r29

      - name: Setup Android NDK
        run: |
          if [ ! -d /github/home/lib/android-ndk-r29 ]; then
            NDK_VERSION="r29"
            NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
            curl -L "https://dl.google.com/android/repository/${NDK_ZIP}" -o /tmp/ndk.zip
            unzip -q /tmp/ndk.zip -d /github/home/lib/
          else
            echo "NDK already cached, skipping download"
          fi

      - name: Build
        run: |
          export ANDROID_NDK_HOME=/github/home/lib/android-ndk-r29
          export NDK=/github/home/lib/android-ndk-r29
          mkdir -p output
          bash -x build.sh -a "${{ matrix.arch }}"

      - name: Rename debs (remove epoch colon)
        run: |
          find output -name "*.deb" | while read f; do
            newname=$(echo "$f" | sed 's/:[0-9]*:/./g')
            if [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: output

  publish:
    needs: build
    runs-on: ubuntu-latest

    env:
      GPG_KEY_ID: B740141714937F5987E2F56AD90D5C7DEC721765

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y git gnupg curl dpkg

      - name: Import GPG key
        run: |
          echo "${{ secrets.PACKAGES_GPG_KEY }}" | base64 -d | gpg --batch --import

      - name: Collect debs
        run: |
          mkdir -p repo-debs
          # استعادة الأسماء الأصلية عند النسخ
          find artifacts -name "*.deb" | while read f; do
            basename=$(basename "$f")
            # استعادة الـ epoch colon
            original=$(echo "$basename" | sed 's/\([0-9]\)\.\([0-9]\{4\}\)/\1:\2/')
            cp "$f" "repo-debs/$original"
          done

      - name: Download termux-apt-repo
        run: |
          curl -L \
            -o termux-apt-repo \
            https://raw.githubusercontent.com/termux/termux-apt-repo/master/termux-apt-repo
          chmod +x termux-apt-repo

      - name: Create repository
        run: |
          mkdir -p repo
          bash ./termux-apt-repo repo-debs repo stable main

      - name: Sign repository
        run: |
          echo "${{ secrets.PACKAGES_GPG_KEY_PASS }}" | \
          gpg \
            --yes \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --digest-algo SHA256 \
            --clearsign \
            -u "${GPG_KEY_ID}" \
            -o repo/dists/stable/InRelease \
            repo/dists/stable/Release

      - name: Deploy to pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pages
          publish_dir: repo
          keep_files: false 
          force_orphan: true 
