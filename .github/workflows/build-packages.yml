name: Build Packages

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch:
          - aarch64
          - arm

    container:
      image: ghcr.io/termux/package-builder:latest
      options: --privileged --device /dev/fuse

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache built packages
        uses: actions/cache@v4
        with:
          path: |
            /data/data/.built-packages
            /github/home/.termux-build
            output
          key: termux-build-${{ matrix.arch }}-${{ hashFiles('packages/**') }}
          restore-keys: |
            termux-build-${{ matrix.arch }}-
          save-always: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            /github/home/.gradle/caches
            /github/home/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-
          save-always: true

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: /github/home/lib/android-ndk-r29
          key: android-ndk-r29
          save-always: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        run: |
          if [ ! -d /github/home/lib/android-ndk-r29 ]; then
            curl -L "https://dl.google.com/android/repository/android-ndk-r29-linux.zip" -o /tmp/ndk.zip
            unzip -q /tmp/ndk.zip -d /github/home/lib/
          else
            echo "NDK cached"
          fi

      - name: Build packages
        run: |
          export ANDROID_NDK_HOME=/github/home/lib/android-ndk-r29
          export NDK=/github/home/lib/android-ndk-r29
          bash -x build.sh -a "${{ matrix.arch }}"

      - name: Show build log
        if: always()
        run: cat output/arm/build.log || cat output/aarch64/build.log || echo "no log"

      - name: Debug debs location
        if: always()
        run: |
          echo "=== output structure ==="
          find output -type f | head -50
          echo "=== all debs ==="
          find . -name "*.deb" -not -path "./.git/*" | head -20

      - name: Show output structure
        run: |
          echo "=== output/ ==="
          find output -type f | head -30
          echo "=== termux-packages/output ==="
          find termux-packages/output -type f -name "*.deb" | head -20 || echo "not found"
          echo "=== /github/home/.termux-build ==="
          find /github/home/.termux-build -name "*.deb" | head -20 || echo "not found"
          
      - name: Rename debs (remove epoch colon)
        run: |
          find output/${{ matrix.arch }} -name "*.deb" | while read f; do
            newname=$(echo "$f" | tr ':' 'COLON')
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

      - uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: packages-${{ matrix.arch }}
          path: output
          retention-days: 7    

  publish:
    needs: build
    runs-on: ubuntu-latest

    env:
      GPG_KEY_ID: B740141714937F5987E2F56AD90D5C7DEC721765

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: output
          
      - name: Restore colon in deb names
        run: |
          find output -name "*COLON*" | while read f; do
            newname=$(echo "$f" | tr 'COLON' ':')
            mv "$f" "$newname"
          done   

      - name: Fix artifact directory structure
        run: |
          mkdir -p output/aarch64/debs output/arm/debs
          find artifacts/packages-aarch64 -name "*.deb" -exec cp {} output/aarch64/debs/ \; || true
          find artifacts/packages-arm -name "*.deb" -exec cp {} output/arm/debs/ \; || true

      - name: Install tools
        run: sudo apt-get install -y gnupg curl wget python3

      - name: Generate APT repository
        run: |
          export COTG_OUTPUT_DIR="$(pwd)/output"
          export COTG_REPO_DIR="$(pwd)/output/repo"
          bash ./generate-apt-repo.sh

      - name: Import GPG key
        run: |
          echo "${{ secrets.PACKAGES_GPG_KEY }}" | base64 -d | gpg --batch --import

      - name: Sign repository
        run: |
          echo "${{ secrets.PACKAGES_GPG_KEY_PASS }}" | \
          gpg \
            --yes \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --digest-algo SHA256 \
            --clearsign \
            -u "${GPG_KEY_ID}" \
            -o output/repo/dists/stable/InRelease \
            output/repo/dists/stable/Release

      - name: Deploy to pages branc h
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pages
          publish_dir: output/repo
          keep_files: false
